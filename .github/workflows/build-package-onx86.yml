name: Build luci-app-pushbot-x86

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH connection to Actions (用于调试)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      package_version:
        description: 'Package version suffix (可选，如: v1.0.0)'
        required: false
        default: ''
  repository_dispatch:
    types: [build-package]
  # schedule:
  #   - cron: '0 14 * * 5'  # 每周五14:00自动构建

env:
  # ========== 基础配置 ==========
  # OpenWrt SDK 下载地址 (基于 24.10.0-rc5)
  SDK_URL: https://downloads.openwrt.org/releases/24.10.0-rc5/targets/x86/64/openwrt-sdk-24.10.0-rc5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
  
  # ========== 包配置 ==========
  PACKAGE_NAME: luci-app-pushbot
  PACKAGE_SOURCE_URL: https://github.com/permails/luci-app-pushbot
  PACKAGE_BRANCH: main  # 或 master，根据需要修改
  
  # ========== 上传配置 ==========
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true
  UPLOAD_WETRANSFER: false
  UPLOAD_COWTRANSFER: false
  UPLOAD_NAS: false
  
  # ========== NAS 配置 (如果启用) ==========
  NAS_FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
  NAS_FTP_PASSWORD: ${{ secrets.FTP_PSW }}
  NAS_FTP_IP: ${{ secrets.FTP_IP }}
  NAS_TARGET_PATH: OpenwrtImgs/packages/luci-app-pushbot
  
  # ========== 通知配置 ==========
  DINGTALK_WEBHOOK: ${{ secrets.WEBHOOK }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  
  # ========== 系统配置 ==========
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # 用于创建 Release
      actions: read
    
    steps:
    # ==================== 1. 环境初始化 ====================
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref }}

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理磁盘空间
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /opt/hostedtoolcache /opt/microsoft /usr/local/share/boost
        
        # 更新系统包
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk \
          gettext git libelf-dev libncurses5-dev libssl-dev \
          python3 python3-dev python3-distutils rsync unzip \
          zlib1g-dev file wget subversion time \
          zstd pigz xz-utils
        
        # 清理缓存
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        
        # 创建工作目录
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
        # 显示磁盘空间
        df -hT

    # ==================== 2. 下载 SDK ====================
    - name: Download OpenWrt SDK
      working-directory: /workdir
      run: |
        echo "Downloading SDK from: $SDK_URL"
        wget -q --show-progress "$SDK_URL" -O sdk.tar.zst
        echo "Extracting SDK..."
        mkdir -p openwrt
        tar -xaf sdk.tar.zst -C openwrt --strip-components=1
        echo "SDK extracted successfully"
        
        # 创建软链接方便后续访问
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

    # ==================== 3. 配置 feeds ====================
    - name: Update feeds
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds update -a
        
    - name: Install feeds
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds install -a

    # ==================== 4. 克隆包源码 ====================
    - name: Clone package source
      working-directory: /workdir/openwrt
      run: |
        echo "Cloning package from: $PACKAGE_SOURCE_URL (branch: $PACKAGE_BRANCH)"
        git clone --depth=1 --branch "$PACKAGE_BRANCH" "$PACKAGE_SOURCE_URL" "package/$PACKAGE_NAME"
        echo "Package cloned to: package/$PACKAGE_NAME"
        
        # 检查是否克隆成功
        if [ ! -d "package/$PACKAGE_NAME" ]; then
          echo "ERROR: Failed to clone package!"
          exit 1
        fi

    # ==================== 5. 配置编译 ====================
    - name: Configure build
      working-directory: /workdir/openwrt
      run: |
        # 生成基础配置
        make defconfig
        
        # 启用包编译
        echo "CONFIG_PACKAGE_$PACKAGE_NAME=y" >> .config
        
        # 可选：启用调试信息（如果需要）
        # echo "CONFIG_DEBUG=y" >> .config
        
        # 显示最终配置
        echo "=== Final .config entries for $PACKAGE_NAME ==="
        grep -i "$PACKAGE_NAME" .config || echo "Package not found in .config"
        echo "================================================"

    # ==================== 6. SSH 调试（可选） ====================
    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.ssh == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ==================== 7. 编译包 ====================
    - name: Compile package
      id: compile
      working-directory: /workdir/openwrt
      run: |
        set -e  # 遇到错误立即退出
        
        # 发送开始通知
        if [ -n "$DINGTALK_WEBHOOK" ]; then
          curl -s "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"【$PACKAGE_NAME】开始编译\",
                \"text\": \"## 🔨 编译开始\n\n- 包名: **$PACKAGE_NAME**\n- 时间: $(date '+%Y-%m-%d %H:%M:%S')\n- 版本: ${PACKAGE_VERSION:-latest}\n- 仓库: [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
        fi
        
        # 编译
        echo "Starting compilation with $(nproc) threads..."
        make package/$PACKAGE_NAME/compile V=s
        
        # 编译完成后检查
        COMPILED_FILE=$(find bin/packages/*/base -name "${PACKAGE_NAME}_*.ipk" 2>/dev/null | head -n1)
        if [ -z "$COMPILED_FILE" ]; then
          echo "ERROR: Package was not compiled successfully!"
          exit 1
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        echo "Package compiled successfully: $COMPILED_FILE"
        
        # 发送完成通知
        if [ -n "$DINGTALK_WEBHOOK" ]; then
          curl -s "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"【$PACKAGE_NAME】编译成功 ✅\",
                \"text\": \"## ✅ 编译完成\n\n- 包名: **$PACKAGE_NAME**\n- 状态: **成功**\n- 时间: $(date '+%Y-%m-%d %H:%M:%S')\n- 仓库: [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
        fi

    # ==================== 8. 检查磁盘空间 ====================
    - name: Check space usage
      if: always()
      run: df -hT

    # ==================== 9. 整理文件 ====================
    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_ARTIFACT == 'true'
      run: |
        # 查找编译后的包
        PACKAGE_DIR="/workdir/openwrt/bin/packages/*/base"
        PACKAGE_FILE=$(find $PACKAGE_DIR -name "${PACKAGE_NAME}_*.ipk" 2>/dev/null | head -n1)
        
        if [ -z "$PACKAGE_FILE" ]; then
          echo "ERROR: Cannot find compiled package!"
          exit 1
        fi
        
        # 设置环境变量
        echo "PACKAGE_PATH=$(dirname $PACKAGE_FILE)" >> $GITHUB_ENV
        echo "PACKAGE_FILE_NAME=$(basename $PACKAGE_FILE)" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
        echo "Package found: $(basename $PACKAGE_FILE)"
        ls -lh "$PACKAGE_FILE"

    # ==================== 10. 上传到 Artifact ====================
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_ARTIFACT == 'true'
      with:
        name: ${{ env.PACKAGE_FILE_NAME }}
        path: ${{ env.PACKAGE_PATH }}/${{ env.PACKAGE_FILE_NAME }}
        retention-days: 30
        compression-level: 0

    # ==================== 11. 上传到 WeTransfer ====================
    - name: Upload to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true'
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress "${PACKAGE_PATH}/${PACKAGE_FILE_NAME}" 2>&1 | tee wetransfer.log
        URL=$(grep -o 'https://[^ ]*' wetransfer.log | head -n1)
        echo "::notice file=wetransfer.com::WeTransfer URL: $URL"
        echo "url=$URL" >> $GITHUB_OUTPUT

    # ==================== 12. 上传到 CowTransfer ====================
    - name: Upload to CowTransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true'
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress "${PACKAGE_PATH}/${PACKAGE_FILE_NAME}" 2>&1 | tee cowtransfer.log
        URL=$(grep -o 'https://[^ ]*' cowtransfer.log | head -n1)
        echo "::notice file=cowtransfer.com::CowTransfer URL: $URL"
        echo "url=$URL" >> $GITHUB_OUTPUT

    # ==================== 13. 上传到 NAS ====================
    - name: Upload to NAS
      id: nas
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_NAS == 'true'
      run: |
        # 检查 NAS 配置
        if [ -z "$NAS_FTP_USERNAME" ] || [ -z "$NAS_FTP_PASSWORD" ] || [ -z "$NAS_FTP_IP" ]; then
          echo "ERROR: NAS credentials not configured!"
          exit 1
        fi
        
        # 创建密码文件
        echo "$NAS_FTP_PASSWORD" > /tmp/rsync.psw
        chmod 600 /tmp/rsync.psw
        
        # 上传文件
        TIMESTAMP=$(date +"%Y.%m.%d-%H%M")
        rsync -avrzP \
          "${PACKAGE_PATH}/${PACKAGE_FILE_NAME}" \
          "${NAS_FTP_USERNAME}@${NAS_FTP_IP}::${NAS_TARGET_PATH}/${TIMESTAMP}/" \
          --password-file=/tmp/rsync.psw
        
        echo "::notice file=nas.upload::Uploaded to NAS successfully"
        echo "status=success" >> $GITHUB_OUTPUT

    # ==================== 14. 创建 Release ====================
    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        if [ -n "${{ github.event.inputs.package_version }}" ]; then
          VERSION="${{ github.event.inputs.package_version }}"
        else
          VERSION=$(date +"%Y.%m.%d-%H%M")
        fi
        
        TAG_NAME="$PACKAGE_NAME-$VERSION"
        echo "release_tag=$TAG_NAME" >> $GITHUB_OUTPUT
        
        # 创建 Release 说明
        cat > release.md << EOF
# $PACKAGE_NAME Package Release

## 📦 版本信息
- **包名**: $PACKAGE_NAME
- **版本**: $VERSION
- **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')
- **SDK**: $(basename $SDK_URL)
- **架构**: x86_64

## 🔗 下载链接
- **Artifact**: 已上传到 GitHub Actions Artifacts
EOF
        
        if [ -n "${{ steps.wetransfer.outputs.url }}" ]; then
          echo "- **WeTransfer**: ${{ steps.wetransfer.outputs.url }}" >> release.md
        fi
        
        if [ -n "${{ steps.cowtransfer.outputs.url }}" ]; then
          echo "- **CowTransfer**: ${{ steps.cowtransfer.outputs.url }}" >> release.md
        fi
        
        if [ "${{ steps.nas.outputs.status }}" == "success" ]; then
          echo "- **NAS**: 已上传到 NAS" >> release.md
        fi
        
        echo "## 📄 说明" >> release.md
        echo "此包适用于 OpenWrt 24.10.0-rc5 x86_64 平台。" >> release.md
        echo "安装命令: \`opkg install $PACKAGE_FILE_NAME\`" >> release.md
        
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: ${{ env.PACKAGE_NAME }} ${{ github.event.inputs.package_version || 'Latest' }}
        body_path: release.md
        files: |
          ${{ env.PACKAGE_PATH }}/${{ env.PACKAGE_FILE_NAME }}
        draft: false
        prerelease: false
        generate_release_notes: false

    # ==================== 15. 清理 Workflow 运行记录 ====================
    - name: Delete old workflow runs
      uses: GitRML/delete-workflow-runs@main
      if: always()
      with:
        retain_days: 7
        keep_minimum_runs: 5

    # ==================== 16. 发送完成通知（最终） ====================
    - name: Send completion notification
      if: always()
      run: |
        if [ -n "$DINGTALK_WEBHOOK" ] && [ "${{ steps.compile.outputs.status }}" == "success" ]; then
          curl -s "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"【$PACKAGE_NAME】编译完成 🎉\",
                \"text\": \"## 🎉 编译完成\n\n- 包名: **$PACKAGE_NAME**\n- 状态: **${{ job.status }}**\n- 时间: $(date '+%Y-%m-%d %H:%M:%S')\n- Release: ${{ steps.tag.outputs.release_tag }}\n- 仓库: [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
        fi
