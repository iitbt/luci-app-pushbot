name: Build luci-app-pushbot-x86

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
#  schedule:
#    - cron: 10 14 * * 5

env:
  SDK_URL: https://downloads.openwrt.org/releases/24.10.0-rc5/targets/x86/64/openwrt-sdk-24.10.0-rc5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
  PackageName: luci-app-pushbot
  PackageSource_URL: https://github.com/permails/luci-app-pushbot
  UPLOAD_Package: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  UPLOAD_ZZNAS: false
  ftp_username: ${{ secrets.FTP_USERNAME }}
  ftp_psw: ${{ secrets.FTP_PSW }}
  ftp_ip: ${{ secrets.FTP_IP }}
  TargetPath: OpenwrtImgs/packages/luci-app-pushbot
  upload_file: luci-app-pushbot_*
  whkey: ${{ secrets.WEBHOOK }}

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用更稳定的版本

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gettext git libelf-dev libncurses5-dev libssl-dev python3 python3-dev \
          python3-distutils rsync unzip zlib1g-dev file wget subversion
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        wget $SDK_URL
        mkdir /workdir/openwrt
        tar xf openwrt-sdk-* -C /workdir/openwrt --strip-components 1
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a
      
    - name: Load custom configuration
      run: |
        cd openwrt
        git clone $PackageSource_URL package/$PackageName
        make defconfig
        echo "CONFIG_PACKAGE_$PackageName=y" >> ./.config
        # 显示配置确认
        grep CONFIG_PACKAGE_$PackageName .config

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Compile the package
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        
        # 先检查包是否存在
        if [ ! -d "package/$PackageName" ]; then
          echo "Error: Package directory not found!"
          exit 1
        fi
        
        # 编译
        make package/$PackageName/compile V=s
        
        # 检查编译结果
        if [ $? -eq 0 ]; then
          echo "Compilation successful!"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "Compilation failed!"
          exit 1
        fi

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Find and list package files
      id: find_package
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt
        echo "Searching for package files..."
        find . -name "*.ipk" -type f | grep -i pushbot || echo "No ipk files found"
        find . -name "*pushbot*" -type f | head -20
        
        # 查找实际的包路径
        PKG_PATH=$(find . -path "*/base/*.ipk" -name "*pushbot*" -type f | head -1)
        if [ -n "$PKG_PATH" ]; then
          PKG_DIR=$(dirname "$PKG_PATH")
          echo "Package directory: $PKG_DIR"
          echo "PKG_DIR=$PKG_DIR" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "No pushbot package found!"
          # 列出所有ipk文件以便调试
          find . -name "*.ipk" -type f | head -20
          exit 1
        fi

    - name: Organize files
      id: organize
      if: steps.find_package.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt
        PKG_FULL_PATH=$(realpath "$PKG_DIR")
        echo "PackagePath=$PKG_FULL_PATH" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        ls -la "$PKG_FULL_PATH"

    - name: Upload package
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: luci-app-pushbot-package
        path: ${{ env.PackagePath }}/*.ipk

    - name: Upload package to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${PackagePath}/*.ipk 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d' ')" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${PackagePath}/*.ipk 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d' ')" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
        touch release.txt
        [ "$UPLOAD_COWTRANSFER" = "true" ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        [ "$UPLOAD_WETRANSFER" = "true" ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload package to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.PackagePath }}/*.ipk

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3
